<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dashboard Inaportnet</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex items-center justify-center bg-[url('/jangkar.webp')] bg-cover bg-center bg-no-repeat relative">

    <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm z-0"></div>

    <div class="glass-card w-full max-w-md p-8 sm:p-10 rounded-2xl z-10 mx-4 shadow-2xl relative overflow-hidden border border-white/20">
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto mb-4 flex items-center justify-center">
                <img src="/kplp.svg" alt="Jangkar" class="w-20 h-20 object-contain drop-shadow-lg" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="hidden bg-blue-600 w-16 h-16 rounded-full items-center justify-center shadow-lg shadow-blue-500/40">
                    <i data-lucide="anchor" class="w-8 h-8 text-white"></i>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">SYAHBANDAR LAPUKO</h1>
            <p class="text-slate-500 text-sm mt-1">Monitoring Pelabuhan Real-time</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input type="text" id="loginUser" required
                            class="w-full pl-10 pr-4 py-2.5 bg-slate-50/50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-slate-800 font-medium placeholder-slate-400"
                            placeholder="Masukkan username">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input type="password" id="loginPass" required
                            class="w-full pl-10 pr-10 py-2.5 bg-slate-50/50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-slate-800 font-medium placeholder-slate-400"
                            placeholder="••••••••">
                        <button type="button" onclick="togglePassword()"
                            class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-600 transition-colors">
                            <i data-lucide="eye" id="eyeIcon" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="loginBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg mt-2 transition-colors shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2">
                    Masuk Sistem <i data-lucide="log-in" class="w-4 h-4"></i>
                </button>
            </div>
        </form>

        <div class="mt-8 text-center text-xs text-slate-400">
            <p>Created for Irfan Syamsul</p>
        </div>
    </div>

<script>
    lucide.createIcons();

    // WAJIB DIISI: URL GAS WEB APP
    const GAS_WEB_APP_URL = "/api";

    const SESSION_KEY    = 'inaportnet_session';
    const SESSION_DURATION = 60 * 60 * 1000; // 1 jam

    // Redirect jika sudah login
    document.addEventListener('DOMContentLoaded', () => {
        try {
            const s = JSON.parse(localStorage.getItem(SESSION_KEY) || '{}');
            if (s.expiry && Date.now() < s.expiry) {
                window.location.href = 'index.html';
            } else {
                localStorage.removeItem(SESSION_KEY);
            }
        } catch(e) { localStorage.removeItem(SESSION_KEY); }
    });

    function togglePassword() {
        const input   = document.getElementById('loginPass');
        const icon    = document.getElementById('eyeIcon');
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        icon.setAttribute('data-lucide', isHidden ? 'eye-off' : 'eye');
        lucide.createIcons({ nodes: [icon.parentElement] });
    }

    async function handleLogin(event) {
        event.preventDefault();
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value;
        const btn  = document.getElementById('loginBtn');

        const origHTML = btn.innerHTML;
        btn.innerHTML  = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Memverifikasi...';
        btn.disabled   = true;
        lucide.createIcons();

        try {
            const response = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'login', username: user, password: pass })
            });

            if (!response.ok) throw new Error('Koneksi ke server gagal.');
            const result = await response.json();

            if (result.status === 'success') {
                // Simpan config sistem ke localStorage
                if (result.config) {
                    localStorage.setItem('inaportnet_config', JSON.stringify(result.config));
                }

                // Simpan session — nama & role dari data user di USERS sheet
                const nama = result.nama || result.username || user;
                localStorage.setItem(SESSION_KEY, JSON.stringify({
                    username:     result.username || user,
                    name:         nama,
                    role:         result.role || 'user',
                    default_port: result.default_port || '',
                    expiry:       Date.now() + SESSION_DURATION
                }));

                Swal.fire({
                    toast: true, position: 'top-end', icon: 'success',
                    title: `Selamat datang, ${nama}!`,
                    showConfirmButton: false, timer: 1500
                });

                setTimeout(() => { window.location.href = 'index.html'; }, 1000);

            } else {
                throw new Error(result.message || 'Kredensial tidak valid.');
            }
        } catch (error) {
            Swal.fire({ icon: 'error', title: 'Gagal Masuk', text: error.message, confirmButtonColor: '#1e3a8a' });
        } finally {
            btn.innerHTML = origHTML;
            btn.disabled  = false;
            lucide.createIcons();
        }
    }
</script>
</body>
</html>
