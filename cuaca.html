<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUD Cuaca Maritim BMKG</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    .leaflet-control-zoom { margin-bottom: 250px !important; }
    @media (min-width: 1024px) {
        .leaflet-control-zoom { margin-bottom: 20px !important; margin-top: 100px !important; }
    }

    .leaflet-popup-content-wrapper {
        background: #0f172a;
        color: #f1f5f9;
        border: 1px solid #334155;
        border-radius: 12px;
    }
    .leaflet-popup-tip {
        background: #0f172a;
    }

    /* Animasi Drawer */
    #side-menu {
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .menu-open #side-menu {
      transform: translateX(0);
    }
    .menu-closed #side-menu {
      transform: translateX(-100%);
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen w-screen overflow-hidden relative menu-closed">

  <!-- HUD Header -->
  <header class="absolute top-4 left-4 lg:top-6 lg:left-6 z-[1000] bg-slate-900/80 backdrop-blur-xl p-3 lg:p-4 rounded-2xl border border-slate-700/50 shadow-2xl flex items-center gap-4 transition-all hover:bg-slate-900/90">
    <!-- Tombol Hamburger -->
    <button id="menu-toggle" class="p-2 hover:bg-slate-800 rounded-lg transition-colors text-blue-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
    
    <div class="h-8 w-[1px] bg-slate-700 mx-1"></div>

    <div class="flex items-center gap-4">
      <div class="bg-blue-500/20 p-2 rounded-lg border border-blue-500/30">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2h4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2.5 2 3.286A5.592 5.592 0 0014 15c1.25 0 2-.75 2-1.972V11c0-1.25-.75-2.017-2-2h4c-1.25 0-2 .75-2 1.972V13c0 7 4 8 7 8" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8" />
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-slate-100 tracking-tight leading-tight">Navigasi Maritim</h1>
        <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-0.5">Operational HUD v2.0</p>
      </div>
    </div>
  </header>

  <!-- Side Navigation Drawer -->
  <div id="side-menu-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] hidden transition-opacity duration-300 opacity-0"></div>
  
  <nav id="side-menu" class="fixed top-0 left-0 h-full w-[280px] lg:w-[320px] bg-slate-950/90 backdrop-blur-2xl z-[2001] border-r border-slate-800 shadow-2xl p-6 flex flex-col transform -translate-x-full transition-transform duration-400">
    <div class="flex justify-between items-center mb-10">
      <h2 class="text-xl font-black text-blue-400 tracking-tighter uppercase">Main Menu</h2>
      <button id="menu-close" class="text-slate-400 hover:text-white p-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="flex flex-col gap-2">
      <a href="index.html" class="flex items-center gap-4 p-4 rounded-xl hover:bg-slate-800/50 transition-all border border-transparent hover:border-slate-700 group">
        <div class="p-2 bg-slate-800 rounded-lg text-slate-400 group-hover:text-blue-400 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
          </svg>
        </div>
        <span class="font-semibold text-slate-300 group-hover:text-white">Beranda Utama</span>
      </a>

      <a href="cuaca.html" class="flex items-center gap-4 p-4 rounded-xl bg-blue-600/10 border border-blue-500/30 transition-all group">
        <div class="p-2 bg-blue-500/20 rounded-lg text-blue-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd" />
          </svg>
        </div>
        <span class="font-semibold text-white">Navigasi Maritim</span>
      </a>
      <div class="h-[1px] bg-slate-800 my-4"></div>
  </nav>

  <!-- Container Peta -->
  <section class="absolute inset-0 z-0" id="map-container"></section>

  <!-- HUD Bottom Console -->
  <aside id="bottom-console" class="absolute bottom-0 left-0 right-0 lg:bottom-6 lg:left-6 lg:right-6 z-[1000] bg-slate-900/90 backdrop-blur-2xl lg:rounded-3xl border-t lg:border border-slate-700/50 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] transition-all duration-500 overflow-hidden">
    <div id="ui-weather-content" class="p-5 lg:p-6">
      <div class="flex flex-col lg:flex-row items-center justify-center h-[160px] lg:h-[150px] gap-4 text-center lg:text-left opacity-70">
         <div class="p-4 rounded-full bg-slate-800/50 border border-slate-700">
           <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-500 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
             <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
           </svg>
         </div>
         <div>
           <p class="text-base font-semibold text-slate-200 uppercase tracking-wide">Pilih Lokasi Operasional</p>
           <p class="text-xs text-slate-400">Klik marker Pelabuhan atau area Perairan untuk memindai data cuaca.</p>
         </div>
      </div>
    </div>
  </aside>

  <script>
    // --- MENU LOGIC ---
    const menuToggle = document.getElementById('menu-toggle');
    const menuClose = document.getElementById('menu-close');
    const sideMenu = document.getElementById('side-menu');
    const sideOverlay = document.getElementById('side-menu-overlay');
    const body = document.body;

    const toggleMenu = (open) => {
      if (open) {
        body.classList.replace('menu-closed', 'menu-open');
        sideOverlay.classList.remove('hidden');
        setTimeout(() => sideOverlay.classList.replace('opacity-0', 'opacity-100'), 10);
      } else {
        body.classList.replace('menu-open', 'menu-closed');
        sideOverlay.classList.replace('opacity-100', 'opacity-0');
        setTimeout(() => sideOverlay.classList.add('hidden'), 300);
      }
    };

    menuToggle.addEventListener('click', () => toggleMenu(true));
    menuClose.addEventListener('click', () => toggleMenu(false));
    sideOverlay.addEventListener('click', () => toggleMenu(false));

    // --- DATA & LOGIC ---
    const POI_LOCATIONS = [
      { id: "loc_torobulu", name: "Pelabuhan Torobulu", lat: -4.446481, lng: 122.456775, adm4: "74.05.19.2011" },
      { id: "loc_lapuko", name: "Pelabuhan Lapuko", lat: -4.157639, lng:  122.701412, adm4: "74.05.10.1001" },
      { id: "loc_amolengo", name: "Pelabuhan Amolengo", lat: -4.424528, lng: 122.851832, adm4: "74.05.23.2010" },
      { id: "loc_langara", name: "Pelabuhan Langara", lat: -4.019740, lng: 122.990352, adm4: "74.12.01.1001" }
    ];

    const uiWeatherContent = document.getElementById('ui-weather-content');

    const flattenWeatherData = (rawData) => rawData?.data?.[0]?.cuaca?.flat() || [];
    const getCurrentWeather = (flatData) => {
      if (!flatData.length) return null;
      const now = new Date();
      return flatData.find(item => new Date(item.local_datetime.replace(' ', 'T')) >= now) || flatData[flatData.length - 1];
    };

    const renderLoading = () => {
      uiWeatherContent.innerHTML = `<div class="flex flex-col lg:flex-row gap-6 items-center animate-pulse h-[150px]"><div class="h-8 w-64 bg-slate-800 rounded"></div><div class="flex-1 bg-slate-800/40 rounded-2xl h-full"></div></div>`;
    };

    const fetchPortWeather = async (adm4, name) => {
      renderLoading();
      try {
        const response = await fetch(`https://api.bmkg.go.id/publik/prakiraan-cuaca?adm4=${adm4}`);
        const data = await response.json();
        const flat = data.data[0].cuaca.flat();
        const current = flat.find(i => new Date(i.local_datetime.replace(' ', 'T')) >= new Date()) || flat[flat.length-1];
        uiWeatherContent.innerHTML = `
          <div class="flex flex-col lg:flex-row gap-6 animate-in fade-in duration-500 h-full items-center">
            <div class="lg:w-[35%] flex items-center gap-4">
              <img src="${current.image}" class="w-16 h-16" />
              <div>
                <h2 class="text-xl font-black text-white">${name}</h2>
                <p class="text-3xl font-black text-blue-400">${current.t}°C <span class="text-xs text-slate-400 font-bold">${current.weather_desc}</span></p>
              </div>
            </div>
            <div class="flex-1 grid grid-cols-4 gap-4 text-center">
              <div><p class="text-[9px] font-black text-slate-500 uppercase">Wind</p><p class="text-sm font-bold">${current.ws} km/j</p></div>
              <div><p class="text-[9px] font-black text-slate-500 uppercase">Humid</p><p class="text-sm font-bold">${current.hu}%</p></div>
              <div><p class="text-[9px] font-black text-slate-500 uppercase">Cloud</p><p class="text-sm font-bold">${current.tcc}%</p></div>
              <div><p class="text-[9px] font-black text-slate-500 uppercase">Vis</p><p class="text-sm font-bold">${current.vs_text}</p></div>
            </div>
          </div>`;
      } catch (err) { uiWeatherContent.innerHTML = `<p class="text-red-400">Error loading data.</p>`; }
    };

    const fetchSeaWeather = async (wpimm, name) => {
      renderLoading();
      try {
        const formattedCode = wpimm.replace(/\. /g, '_').replace(/[()]/g, '');
        const response = await fetch(`https://peta-maritim.bmkg.go.id/public_api/perairan/${encodeURIComponent(formattedCode)}.json`);
        const data = await response.json();
        const current = data.data[0];
        uiWeatherContent.innerHTML = `
          <div class="flex flex-col lg:flex-row gap-6 animate-in fade-in duration-500 h-full items-center">
            <div class="lg:w-[35%]">
              <span class="text-[10px] bg-blue-600 px-2 py-0.5 rounded font-black uppercase">Maritime</span>
              <h2 class="text-xl font-black text-white truncate">${name}</h2>
              <p class="text-sm text-blue-300 italic">${current.weather}</p>
            </div>
            <div class="lg:w-[30%] flex gap-4">
              <div class="bg-slate-800/60 p-3 rounded-xl border border-slate-700 w-full">
                <p class="text-[9px] font-black text-slate-500 uppercase">Gelombang</p>
                <p class="text-lg font-black text-white">${current.wave_desc}</p>
              </div>
              <div class="bg-slate-800/60 p-3 rounded-xl border border-slate-700 w-full">
                <p class="text-[9px] font-black text-slate-500 uppercase">Angin</p>
                <p class="text-lg font-black text-white">${current.wind_speed_max} <span class="text-xs">kt</span></p>
              </div>
            </div>
            <div class="flex-1 overflow-hidden">
               <p class="text-[10px] text-slate-500 font-bold mb-2 uppercase tracking-widest">${current.weather_desc.substring(0, 100)}...</p>
            </div>
          </div>`;
      } catch (err) { uiWeatherContent.innerHTML = `<p class="text-red-400">Error loading sea data.</p>`; }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const map = L.map('map-container', { zoomControl: false }).setView([-4.25, 122.75], 9);
      L.control.zoom({ position: 'topright' }).addTo(map);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);

      const portIcon = L.icon({ iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png', iconSize: [25, 41], iconAnchor: [12, 41] });

      POI_LOCATIONS.forEach(loc => {
        const marker = L.marker([loc.lat, loc.lng], { icon: portIcon }).addTo(map);
        marker.on('click', (e) => { L.DomEvent.stopPropagation(e); map.flyTo([loc.lat - 0.05, loc.lng], 12, { duration: 1.2 }); fetchPortWeather(loc.adm4, loc.name); });
      });

      fetch('https://peta-maritim.bmkg.go.id/public_api/static/wilayah_perairan.json')
        .then(res => res.json())
        .then(geojsonData => {
          const seaLayer = L.geoJSON(geojsonData, {
            style: { color: '#3b82f6', weight: 1, opacity: 0.4, fillColor: '#1e3a8a', fillOpacity: 0.05, dashArray: '4, 4' },
            onEachFeature: (feature, layer) => {
              const wpName = feature.properties.WP_IMM || "Perairan";
              const wpVal = feature.properties.WPIMM;
              layer.bindTooltip(wpName, { sticky: true, className: 'bg-slate-950 text-blue-400 border-none text-[10px] font-bold p-1' });
              layer.on({
                mouseover: (e) => e.target.setStyle({ weight: 2, opacity: 0.8, fillOpacity: 0.15, dashArray: '' }),
                mouseout: (e) => seaLayer.resetStyle(e.target),
                click: (e) => {
                  L.DomEvent.stopPropagation(e);
                  L.popup().setLatLng(e.latlng).setContent(`<div class="p-1 font-bold text-xs">Scanning: ${wpName}</div>`).openOn(map);
                  fetchSeaWeather(wpVal, wpName);
                }
              });
            }
          }).addTo(map);
        });
    });
  </script>
</body>
</html>
